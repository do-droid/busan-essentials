startCommand:
  type: http
  configSchema:
    type: object
    properties: {}
  commandFunction: |-
    (config) => ({
      command: "uv",
      args: ["run", "python", "-m", "src.server"],
      env: {
        API_BASE_URL: "TO_BE_FILLED_AFTER_BACKEND_DEPLOY",
        PORT: "8081"
      }
    })
build:
  dockerfile: Dockerfile
  dockerBuildPath: "."
